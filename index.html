<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1020" />
    <meta
      name="description"
      content="Edura — premium CRM for educational centers. Manage students, groups, teachers, payments and leads in one workspace."
    />
    <meta property="og:title" content="Edura CRM" />
    <meta property="og:description" content="Premium CRM SaaS for educational centers in Uzbekistan." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>Edura — CRM for Education</title>
    <style>
      :root { color-scheme: light dark; }
      html, body, #root { height: 100%; }
      body {
        margin: 0;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background: #0b1020;
        color: #e6e9f2;
        -webkit-font-smoothing: antialiased;
      }
      .app-splash {
        position: fixed; inset: 0; display: grid; place-items: center;
        background: radial-gradient(1200px 600px at 50% -10%, rgba(99,102,241,.35), transparent 60%),
                    radial-gradient(800px 400px at 110% 110%, rgba(168,85,247,.25), transparent 60%),
                    #0b1020;
        z-index: 9999;
      }
      .app-splash__logo {
        font-weight: 800; font-size: 28px; letter-spacing: -0.02em;
        background: linear-gradient(135deg, #a78bfa, #60a5fa 50%, #34d399);
        -webkit-background-clip: text; background-clip: text; color: transparent;
        display: flex; align-items: center; gap: 12px;
      }
      .app-splash__dot {
        width: 10px; height: 10px; border-radius: 999px;
        background: linear-gradient(135deg, #a78bfa, #60a5fa);
        box-shadow: 0 0 24px rgba(99,102,241,.7);
        animation: pulse 1.4s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.5); opacity: .6; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-splash" aria-hidden="true">
        <div class="app-splash__logo">
          <span class="app-splash__dot"></span>
          Edura
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
